<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>URL Shortener with Analytics</h1>

    <div class="card">
      <h2>Create Short URL</h2>
      <input type="text" id="target_url" placeholder="Enter long URL" />
      <button onclick="createShortLink()">Create Short Link</button>
      <div id="result"></div>
    </div>

    <div class="card">
      <h2>All Short Links</h2>
      <button onclick="loadLinks()">Load Links</button>
      <ul id="linksList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
